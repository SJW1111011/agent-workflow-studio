<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Agent Workflow Studio dashboard for tracking tasks, verification evidence, checkpoints, and local execution state."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2318221d'/%3E%3Cpath d='M18 20h28v6H24v12h18v6H24v4h22v6H18z' fill='%23ef6c33'/%3E%3C/svg%3E"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f7f2e8" />
    <title>Agent Workflow Studio Dashboard</title>
    <script>
      (() => {
        const storageKey = "agent-workflow-studio:theme";
        const root = document.documentElement;
        const themeMeta = document.querySelector('meta[name="theme-color"]');

        let theme = "system";

        try {
          const stored = window.localStorage.getItem(storageKey);
          if (stored === "light" || stored === "dark" || stored === "system") {
            theme = stored;
          }
        } catch {}

        const prefersDark =
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolvedTheme =
          theme === "system" ? (prefersDark ? "dark" : "light") : theme;

        root.dataset.theme = theme;
        root.dataset.resolvedTheme = resolvedTheme;
        root.style.colorScheme = resolvedTheme;

        if (themeMeta) {
          themeMeta.setAttribute(
            "content",
            resolvedTheme === "dark" ? "#0d1411" : "#f7f2e8",
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
