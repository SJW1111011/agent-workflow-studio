<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .content {
      height: 2000px;
      padding: 20px;
    }

    .test-button {
      padding: 12px 24px;
      background: #ef6c33;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    /* Modal styles - copied from dashboard */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-content {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      padding: 2rem;
    }

    .modal-content h2 {
      margin: 0 0 1rem 0;
    }

    .modal-content input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .modal-content button {
      padding: 0.75rem 2rem;
      background: #ef6c33;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    .hidden {
      display: none;
    }

    /* Test different viewport widths */
    @media (max-width: 540px) {
      body {
        background: #f0f0f0;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Modal Test Page</h1>
    <p>Current viewport width: <span id="width"></span>px</p>
    <p>Scroll down and click the button to test modal at different scroll positions.</p>
    <button class="test-button" onclick="openModal()">Open Modal</button>

    <div style="margin-top: 500px;">
      <button class="test-button" onclick="openModal()">Open Modal (Middle)</button>
    </div>

    <div style="margin-top: 500px;">
      <button class="test-button" onclick="openModal()">Open Modal (Bottom)</button>
    </div>
  </div>

  <div id="modal" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h2>Test Modal</h2>
      <input type="text" placeholder="Type something..." />
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    function updateWidth() {
      document.getElementById('width').textContent = window.innerWidth;
    }

    function openModal() {
      console.log('Opening modal at scroll position:', window.scrollY);
      console.log('Viewport width:', window.innerWidth);
      document.getElementById('modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      console.log('Closing modal');
      document.getElementById('modal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    updateWidth();
    window.addEventListener('resize', updateWidth);
  </script>
</body>
</html>
