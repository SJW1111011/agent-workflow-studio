<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Workflow Studio dashboard overview preview</title>
  <desc id="desc">A stylized preview of the local-first Agent Workflow Studio dashboard with overview tabs, stat cards, and adapter panels.</desc>
  <defs>
    <linearGradient id="pageBg" x1="120" y1="60" x2="1330" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF6EE"/>
      <stop offset="0.55" stop-color="#F7F2E8"/>
      <stop offset="1" stop-color="#EDE7D9"/>
    </linearGradient>
    <radialGradient id="glowWarm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 120) rotate(36) scale(520 360)">
      <stop stop-color="#EF6C33" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#EF6C33" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCool" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1290 96) rotate(140) scale(520 360)">
      <stop stop-color="#0F6C5C" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0F6C5C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heroBg" x1="240" y1="110" x2="1140" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8F0" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#F5EDE1" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="tabActive" x1="236" y1="364" x2="404" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24332C"/>
      <stop offset="1" stop-color="#2F4B40"/>
    </linearGradient>
    <linearGradient id="cardDark" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#2B342E"/>
      <stop offset="1" stop-color="#253029"/>
    </linearGradient>
    <linearGradient id="cardBreakdown" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2A352F"/>
      <stop offset="1" stop-color="#325145"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1440" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#18221D" flood-opacity="0.12"/>
    </filter>
    <style>
      .sans { font-family: Aptos, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
      .display { font-family: Georgia, "Times New Roman", serif; }
      .ink { fill: #18221D; }
      .muted { fill: #57645D; }
      .soft { fill: rgba(24, 34, 29, 0.72); }
      .pillText { fill: #6B746D; font-size: 14px; font-weight: 600; }
      .eyebrow { fill: #0F6C5C; font-size: 15px; font-weight: 700; letter-spacing: 0.18em; }
      .tab { fill: #68736B; font-size: 14px; font-weight: 700; }
      .tabActiveText { fill: #F9F5EF; font-size: 14px; font-weight: 700; }
      .cardLabel { fill: rgba(249, 245, 239, 0.7); font-size: 13px; font-weight: 700; letter-spacing: 0.08em; }
      .cardValue { fill: #F9F5EF; font-size: 41px; font-weight: 700; }
      .cardNote { fill: rgba(249, 245, 239, 0.74); font-size: 13px; }
      .miniLabel { fill: rgba(249, 245, 239, 0.62); font-size: 11px; font-weight: 700; letter-spacing: 0.07em; }
      .miniValue { fill: #F9F5EF; font-size: 18px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#pageBg)"/>
  <rect width="1440" height="900" fill="url(#glowWarm)"/>
  <rect width="1440" height="900" fill="url(#glowCool)"/>

  <g filter="url(#shadow)">
    <rect x="190" y="28" width="1060" height="228" rx="34" fill="url(#heroBg)" stroke="rgba(24, 34, 29, 0.08)"/>
    <text x="220" y="66" class="sans eyebrow">LOCAL-FIRST CONTROL PLANE</text>
    <text x="220" y="112" class="display ink" font-size="46" font-weight="700">Agent Workflow</text>
    <text x="220" y="164" class="display ink" font-size="46" font-weight="700">Studio</text>
    <text x="220" y="208" class="sans muted" font-size="17">Turn tasks into prompts, prompts into evidence, and evidence into resumable</text>
    <text x="220" y="235" class="sans muted" font-size="17">project memory.</text>

    <rect x="1068" y="54" width="124" height="34" rx="17" fill="rgba(255,255,255,0.8)" stroke="rgba(24, 34, 29, 0.06)"/>
    <text x="1130" y="76" text-anchor="middle" class="sans pillText">Codex + Claude Code</text>

    <rect x="956" y="102" width="236" height="52" rx="26" fill="rgba(255,255,255,0.76)" stroke="rgba(24, 34, 29, 0.06)"/>
    <rect x="974" y="117" width="78" height="22" rx="11" fill="rgba(240, 233, 223, 0.94)"/>
    <rect x="1060" y="117" width="114" height="22" rx="11" fill="rgba(246, 240, 231, 0.9)"/>
    <text x="1130" y="132" text-anchor="middle" class="sans muted" font-size="12">sample workspace root</text>

    <rect x="190" y="274" width="1060" height="42" rx="21" fill="rgba(255, 251, 245, 0.88)" stroke="rgba(24, 34, 29, 0.09)"/>
    <rect x="198" y="280" width="200" height="30" rx="15" fill="url(#tabActive)"/>
    <text x="298" y="300" text-anchor="middle" class="sans tabActiveText">Overview</text>
    <text x="500" y="300" text-anchor="middle" class="sans tab">Tasks</text>
    <text x="700" y="300" text-anchor="middle" class="sans tab">Actions</text>
    <text x="900" y="300" text-anchor="middle" class="sans tab">Verification</text>
    <text x="1140" y="300" text-anchor="middle" class="sans tab">Runs</text>

    <g transform="translate(190 334)">
      <rect width="170" height="350" rx="24" fill="url(#cardDark)"/>
      <text x="18" y="28" class="sans cardLabel">TASKS</text>
      <text x="18" y="82" class="sans cardValue">3</text>
    </g>

    <g transform="translate(376 334)">
      <rect width="170" height="350" rx="24" fill="url(#cardDark)"/>
      <text x="18" y="28" class="sans cardLabel">RUNS</text>
      <text x="18" y="82" class="sans cardValue">7</text>
    </g>

    <g transform="translate(562 334)">
      <rect width="170" height="350" rx="24" fill="url(#cardDark)"/>
      <text x="18" y="28" class="sans cardLabel">RISKS</text>
      <text x="18" y="82" class="sans cardValue">2</text>
    </g>

    <g transform="translate(748 334)">
      <rect width="170" height="350" rx="24" fill="url(#cardDark)"/>
      <text x="18" y="28" class="sans cardLabel">MEMORY DOCS</text>
      <text x="18" y="82" class="sans cardValue">4</text>
    </g>

    <g transform="translate(934 334)">
      <rect width="170" height="350" rx="24" fill="url(#cardBreakdown)"/>
      <text x="18" y="28" class="sans cardLabel">EXECUTOR</text>
      <text x="18" y="46" class="sans cardLabel">OUTCOMES</text>
      <text x="18" y="94" class="sans cardValue">2</text>
      <text x="18" y="122" class="sans cardNote">2 of 3 tasks have local</text>
      <text x="18" y="140" class="sans cardNote">executor evidence.</text>

      <rect x="16" y="162" width="66" height="66" rx="14" fill="rgba(255,255,255,0.1)"/>
      <rect x="92" y="162" width="66" height="66" rx="14" fill="rgba(239, 108, 51, 0.16)"/>
      <rect x="16" y="238" width="66" height="66" rx="14" fill="rgba(239, 108, 51, 0.16)"/>
      <rect x="92" y="238" width="66" height="66" rx="14" fill="rgba(255,255,255,0.08)"/>
      <rect x="16" y="314" width="66" height="66" rx="14" fill="rgba(255,255,255,0.08)"/>
      <rect x="92" y="314" width="66" height="66" rx="14" fill="rgba(255,255,255,0.08)"/>

      <text x="28" y="182" class="sans miniLabel">PASSED</text>
      <text x="28" y="214" class="sans miniValue">2</text>
      <text x="104" y="182" class="sans miniLabel">FAILED</text>
      <text x="104" y="214" class="sans miniValue">0</text>
      <text x="28" y="258" class="sans miniLabel">TIMED</text>
      <text x="28" y="272" class="sans miniLabel">OUT</text>
      <text x="28" y="294" class="sans miniValue">0</text>
      <text x="104" y="258" class="sans miniLabel">INTERRUPTED</text>
      <text x="104" y="294" class="sans miniValue">0</text>
      <text x="28" y="334" class="sans miniLabel">CANCELLED</text>
      <text x="28" y="366" class="sans miniValue">0</text>
      <text x="104" y="334" class="sans miniLabel">NO</text>
      <text x="104" y="348" class="sans miniLabel">RUN</text>
      <text x="104" y="370" class="sans miniValue">1</text>
    </g>

    <g transform="translate(1116 334)">
      <rect width="134" height="350" rx="24" fill="url(#cardBreakdown)"/>
      <text x="18" y="28" class="sans cardLabel">VERIFICATION</text>
      <text x="18" y="46" class="sans cardLabel">SIGNALS</text>
      <text x="18" y="94" class="sans cardValue">3</text>
      <text x="18" y="122" class="sans cardNote">3 of 3 tasks have</text>
      <text x="18" y="140" class="sans cardNote">planned or explicit</text>
      <text x="18" y="158" class="sans cardNote">verification signals.</text>

      <rect x="14" y="184" width="46" height="64" rx="12" fill="rgba(255,255,255,0.08)"/>
      <rect x="68" y="184" width="46" height="64" rx="12" fill="rgba(239, 108, 51, 0.16)"/>
      <rect x="14" y="256" width="46" height="64" rx="12" fill="rgba(239, 108, 51, 0.16)"/>
      <rect x="68" y="256" width="46" height="64" rx="12" fill="rgba(255,255,255,0.08)"/>
      <rect x="14" y="328" width="46" height="52" rx="12" fill="rgba(255,255,255,0.08)"/>

      <text x="24" y="204" class="sans miniLabel">STRONG</text>
      <text x="24" y="234" class="sans miniValue">3</text>
      <text x="78" y="204" class="sans miniLabel">MIXED</text>
      <text x="78" y="234" class="sans miniValue">0</text>
      <text x="24" y="276" class="sans miniLabel">DRAFT</text>
      <text x="24" y="306" class="sans miniValue">0</text>
      <text x="78" y="276" class="sans miniLabel">PLANNED</text>
      <text x="78" y="306" class="sans miniValue">0</text>
      <text x="24" y="348" class="sans miniLabel">NONE</text>
      <text x="24" y="370" class="sans miniValue">0</text>
    </g>

    <rect x="190" y="702" width="1060" height="126" rx="24" fill="rgba(255, 251, 245, 0.84)" stroke="rgba(24, 34, 29, 0.08)"/>
    <text x="216" y="753" class="sans ink" font-size="24" font-weight="700">Adapters</text>
    <text x="700" y="745" class="sans muted" font-size="14">The runtime contracts that bridge workflow state into Codex and Claude</text>
    <text x="700" y="767" class="sans muted" font-size="14">Code, with local execution, evidence capture, and verification context.</text>
  </g>
</svg>
