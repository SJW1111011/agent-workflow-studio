name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-smoke:
    name: ${{ matrix.os }} / node-${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node:
          - "20"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Run unit tests
        run: npm test

      - name: Run workspace validation
        run: npm run validate -- --root .

      - name: Run smoke test
        run: npm run smoke
